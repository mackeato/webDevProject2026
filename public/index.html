<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Venue Page</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="container nav">
        <a class="brand" href="./index.html">
          <div class="brand-mark"></div>
          <div class="brand-title">JKPG City</div>
        </a>

        <nav class="nav-links">
          <a href="./index.html">Upptäck</a>
          <a href="./admin.html">Admin</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <section class="hero">
        <div class="hero-grid">
          <div class="hero-main">
            <div class="hero-kicker">
              Välkommen till ditt Jönköping alhamdulliah
            </div>
            <h1 class="hero-title">Du är centrum.</h1>
            <p class="hero-sub">
              Hitta butiker, caféer, restauranger och upplevelser. Sortera,
              filtrera och öppna för mer info.
            </p>
          </div>

          <aside class="hero-season">
            <h2 class="season-title">Butikerna i Stan.</h2>
            <p class="season-note">Jönköping City</p>
          </aside>
        </div>
      </section>

      <section class="controls">
        <input class="input" id="search" placeholder="Sök verksamhet..." />
        <select id="sort">
          <option value="name">Sortera: Namn</option>
          <option value="type">Sortera: Type</option>
          <option value="district">Sortera: District</option>
        </select>
      </section>

      <section class="grid" id="venueGrid">
        <!-- cards inserted by JS -->
      </section>
    </main>

    <footer>
      <div class="container">not© JKPG City mockup by studentos</div>
    </footer>

    <script src="js/main.js"></script>
  </body>
</html>
